<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Reservas Pátio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a1f3a;
    --gold: #d4af37;
    --cream: #faf8f4;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e0d8;
    --red: #DC2626;
    --green: #16A34A;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, #2a2f4a 100%); padding: 2rem; }
  .login-box { background: white; border-radius: 16px; padding: 3rem; max-width: 400px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
  .login-icon { font-size: 3rem; text-align: center; margin-bottom: 1rem; }
  .login-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--navy); text-align: center; margin-bottom: 0.5rem; }
  .login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 2rem; }

  .form-group { margin-bottom: 1.5rem; }
  label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: white; }
  input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }

  .btn-login { width: 100%; padding: 12px; background: var(--navy); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-login:hover { background: var(--gold); }
  .btn-login:disabled { opacity: 0.5; cursor: default; }

  .error-msg { color: var(--red); font-size: 12px; text-align: center; margin-bottom: 1rem; display: none; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .dashboard.active { display: block; }

  header { background: var(--navy); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-title { color: white; font-size: 16px; font-weight: 500; }
  .header-right { display: flex; gap: 1rem; align-items: center; }
  .header-date { color: rgba(255,255,255,0.7); font-size: 13px; }
  .btn-logout { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .btn-logout:hover { background: var(--red); border-color: var(--red); }

  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
  .dash-title { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 2rem; color: var(--navy); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .stat-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; text-align: center; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--navy); margin-bottom: 0.5rem; }
  .stat-desc { font-size: 12px; color: var(--green); }

  .card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 2rem; margin-bottom: 2rem; }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--navy); margin-bottom: 1.5rem; }

  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--cream); padding: 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover { background: var(--cream); }

  .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-sala { background: #FEF3EA; color: #E8762B; }
  .badge-campo { background: #E8F7F5; color: #00A896; }

  .empty { text-align: center; color: var(--muted); padding: 2rem; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .stats-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 1rem; }
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">Admin Portal</h1>
    <p class="login-sub">Pátio das Letras — Reservas</p>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <form onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" required>
      </div>
      
      <div class="form-group">
        <label>Palavra-passe</label>
        <input type="password" id="password" placeholder="patio2024" required>
      </div>
      
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <div class="header-left">
      <div class="logo-icon">⚙️</div>
      <div class="header-title">Admin — Reservas Pátio</div>
    </div>
    <div class="header-right">
      <div class="header-date" id="headerDate"></div>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <main>
    <h1 class="dash-title">Dashboard Administrativo</h1>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total de Reservas</div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-desc">Este mês</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sala de Festas</div>
        <div class="stat-value" id="statSala">0</div>
        <div class="stat-desc">Activas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Campo de Futebol</div>
        <div class="stat-value" id="statCampo">0</div>
        <div class="stat-desc">Activas</div>
      </div>
    </div>

    <!-- TABELA -->
    <div class="card">
      <h2 class="card-title">Todas as Reservas</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Espaço</th>
              <th>Prédio</th>
              <th>Andar</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Telefone</th>
            </tr>
          </thead>
          <tbody id="tableReservas">
            <tr><td colspan="8" class="empty">Carregando reservas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxj7_8EpZbSXEN3pfcHtZJ2HBfWcdm9Pl8JNP0698Mo5EsH9Dj0MQJkeO8IhbZcf-_u/exec';
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'patio2024';

let reservas = [];
let isLoggedIn = false;

// Init
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('pt-PT', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

// Check if already logged in
if (localStorage.getItem('adminLoggedIn') === 'true') {
  isLoggedIn = true;
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  carregarDados();
}

// Login
function fazerLogin(event) {
  event.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('errorMsg');

  if (username === ADMIN_USER && password === ADMIN_PASS) {
    localStorage.setItem('adminLoggedIn', 'true');
    isLoggedIn = true;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    carregarDados();
  } else {
    errorDiv.textContent = 'Username ou palavra-passe incorretos';
    errorDiv.style.display = 'block';
    setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
  }
}

// Logout
function fazerLogout() {
  localStorage.removeItem('adminLoggedIn');
  isLoggedIn = false;
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// Carregar dados
async function carregarDados() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=list');
    const data = await res.json();
    
    if (data.success) {
      reservas = data.reservas || [];
      atualizarDashboard();
    }
  } catch(e) {
    console.error('Erro:', e);
  }
}

// Atualizar dashboard
function atualizarDashboard() {
  const hoje = new Date();
  const mesAtual = hoje.getFullYear() + '-' + String(hoje.getMonth() + 1).padStart(2, '0');
  
  const reservasMes = reservas.filter(r => r.data && r.data.startsWith(mesAtual));
  const sala = reservas.filter(r => r.espaco === 'sala' && r.data >= new Date().toISOString().split('T')[0]);
  const campo = reservas.filter(r => r.espaco === 'campo' && r.data >= new Date().toISOString().split('T')[0]);
  
  document.getElementById('statTotal').textContent = reservasMes.length;
  document.getElementById('statSala').textContent = sala.length;
  document.getElementById('statCampo').textContent = campo.length;
  
  renderizarTabela();
}

// Renderizar tabela
function renderizarTabela() {
  const tbody = document.getElementById('tableReservas');
  
  if (reservas.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">Sem reservas</td></tr>';
    return;
  }
  
  const sorted = [...reservas].sort((a, b) => (b.data + b.inicio).localeCompare(a.data + a.inicio));
  
  tbody.innerHTML = sorted.map(r => {
    const dataBR = new Date(r.data + 'T12:00:00').toLocaleDateString('pt-PT');
    const espaco = r.espaco === 'sala' ? '🎉 Sala' : '⚽ Campo';
    const badgeClass = r.espaco === 'sala' ? 'badge-sala' : 'badge-campo';
    
    return `<tr>
      <td>${dataBR}</td>
      <td>${r.inicio}–${r.fim}</td>
      <td><span class="badge ${badgeClass}">${espaco}</span></td>
      <td>${r.predio || '—'}</td>
      <td>${r.andar || '—'}</td>
      <td>${r.nome || '—'}</td>
      <td>${r.email || '—'}</td>
      <td>${r.telefone || '—'}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
