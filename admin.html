<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Pátio das Letras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a1f3a;
    --gold: #d4af37;
    --gold-light: #f5f1e8;
    --cream: #faf8f4;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e0d8;
    --red: #DC2626;
    --green: #16A34A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, #2a2f4a 100%); padding: 2rem; }
  .login-box { background: white; border-radius: 16px; padding: 3rem; max-width: 400px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
  .login-logo { text-align: center; margin-bottom: 1.5rem; }
  .login-logo img { height: 80px; width: auto; }
  .login-title { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--navy); text-align: center; margin-bottom: 0.25rem; letter-spacing: 0.5px; }
  .login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 2rem; }

  .form-group { margin-bottom: 1.5rem; }
  label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: white; }
  input:focus, select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }

  .btn-login { width: 100%; padding: 12px; background: var(--navy); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-login:hover { background: var(--gold); }

  .error-msg { color: var(--red); font-size: 12px; text-align: center; margin-bottom: 1rem; display: none; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .dashboard.active { display: block; }

  header { background: var(--navy); padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); height: 72px; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 48px; width: auto; object-fit: contain; }
  .logo-text { font-family: 'Great Vibes', cursive; color: var(--gold); font-size: 28px; line-height: 1; letter-spacing: 0.5px; }
  .logo-sub { color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 0.5px; margin-top: 4px; }
  .header-right { display: flex; gap: 1rem; align-items: center; }
  .header-date { color: rgba(255,255,255,0.7); font-size: 13px; }
  .btn-logout { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .btn-logout:hover { background: var(--red); border-color: var(--red); }

  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
  .dash-title { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 2rem; color: var(--navy); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .stat-card { background: white; border-radius: 16px; border: 1px solid var(--border); padding: 1.5rem; text-align: center; border-left: 4px solid var(--gold); }
  .stat-card.sala { border-left-color: #E8762B; }
  .stat-card.campo { border-left-color: #00A896; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--navy); margin-bottom: 0.25rem; }
  .stat-desc { font-size: 12px; color: var(--green); }

  .card { background: white; border-radius: 16px; border: 1px solid var(--border); padding: 2rem; margin-bottom: 2rem; }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--navy); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }

  .filters { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .filters select { padding: 8px 12px; font-size: 13px; width: auto; min-width: 150px; }

  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--cream); padding: 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover { background: var(--cream); }

  .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-sala { background: #FEF3EA; color: #E8762B; }
  .badge-campo { background: #E8F7F5; color: #00A896; }

  .empty { text-align: center; color: var(--muted); padding: 2rem; }

  .btn-del { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .btn-del:hover { background: #b91c1c; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .stats-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 1rem; height: auto; padding: 1rem; }
    .logo-text { font-size: 22px; }
    .card { padding: 1rem; }
    .card-title { font-size: 1.2rem; }
    .filters { width: 100%; }
    .filters select { flex: 1; min-width: 0; }
    th, td { padding: 8px; font-size: 12px; }
    .dash-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1 class="login-title">Pátio das Letras</h1>
    <p class="login-sub">Admin Portal — Reservas</p>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Palavra-passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <div class="header-left">
      <div>
        <div class="logo-text">Pátio das Letras</div>
        <div class="logo-sub">Admin — Reservas</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="headerDate"></div>
      <button class="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <main>
    <h1 class="dash-title">Dashboard Administrativo</h1>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total (este mês)</div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-desc">Reservas</div>
      </div>
      <div class="stat-card sala">
        <div class="stat-label">🎉 Sala de Festas</div>
        <div class="stat-value" id="statSala">0</div>
        <div class="stat-desc">Activas</div>
      </div>
      <div class="stat-card campo">
        <div class="stat-label">⚽ Campo de Futebol</div>
        <div class="stat-value" id="statCampo">0</div>
        <div class="stat-desc">Activas</div>
      </div>
    </div>

    <!-- TABELA -->
    <div class="card">
      <h2 class="card-title">
        <span>Todas as Reservas</span>
        <div class="filters">
          <select id="filtroEspaco" onchange="renderizarTabela()">
            <option value="">Todos os espaços</option>
            <option value="sala">Sala de Festas</option>
            <option value="campo">Campo de Futebol</option>
          </select>
          <select id="filtroPeriodo" onchange="renderizarTabela()">
            <option value="futuras">Futuras</option>
            <option value="todas">Todas</option>
            <option value="passadas">Passadas</option>
          </select>
        </div>
      </h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Espaço</th>
              <th>Prédio</th>
              <th>Andar</th>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Email</th>
              <th>Descrição</th>
              <th>Acções</th>
            </tr>
          </thead>
          <tbody id="tableReservas">
            <tr><td colspan="10" class="empty">A carregar reservas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwf564qKCwRc24q_DDzo9QYfnJXViPJnZmD70JgOG6M3dw2Hb0nc3Jv0-sIJO7kwOET/exec';
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'patio2024';

// Mapa de prédios (valor → nome bonito)
const PREDIOS_NOMES = {
  '14-gil-vicente': 'Gil Vicente',
  '16-luis-camoes': 'Luís de Camões',
  '18-almeida-garrett': 'Almeida Garrett',
  '20-eca-queiroz': 'Eça de Queiroz',
  '4-guerra-junqueiro': 'Guerra Junqueiro',
  '6-florbela-espanca': 'Florbela Espanca',
  '8-fernando-pessoa': 'Fernando Pessoa',
  '10-miguel-torga': 'Miguel Torga'
};

const ANDARES_NOMES = {
  'rc-esq': 'R/C ESQ', 'rc-drt': 'R/C DRT',
  '1-esq': '1º ESQ', '1-drt': '1º DRT',
  '2-esq': '2º ESQ', '2-drt': '2º DRT',
  '3-esq': '3º ESQ', '3-drt': '3º DRT',
  '4-esq': '4º ESQ', '4-drt': '4º DRT',
  '5-esq': '5º ESQ', '5-drt': '5º DRT'
};

let reservas = [];

// Init
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('pt-PT', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

// Check if already logged in
if (localStorage.getItem('adminLoggedIn') === 'true') {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  carregarDados();
}

// Login
function fazerLogin(event) {
  event.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('errorMsg');

  if (username === ADMIN_USER && password === ADMIN_PASS) {
    localStorage.setItem('adminLoggedIn', 'true');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    carregarDados();
  } else {
    errorDiv.textContent = 'Username ou palavra-passe incorretos';
    errorDiv.style.display = 'block';
    setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
  }
}

// Logout
function fazerLogout() {
  localStorage.removeItem('adminLoggedIn');
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// Carregar dados
async function carregarDados() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=list');
    const data = await res.json();

    if (data.success) {
      reservas = (data.reservas || []).map(r => ({
        id: String(r.id || ''),
        espaco: String(r.espaco || ''),
        data: String(r.data || ''),
        inicio: String(r.inicio || ''),
        fim: String(r.fim || ''),
        predio: String(r.predio || ''),
        andar: String(r.andar || ''),
        nome: String(r.nome || ''),
        telefone: String(r.telefone || ''),
        email: String(r.email || ''),
        descricao: String(r.descricao || ''),
        pin: String(r.pin || '')
      }));
      atualizarDashboard();
    }
  } catch(e) {
    console.error('Erro:', e);
    document.getElementById('tableReservas').innerHTML = '<tr><td colspan="10" class="empty">Erro ao carregar reservas</td></tr>';
  }
}

// Atualizar dashboard
function atualizarDashboard() {
  const hoje = new Date();
  const mesAtual = hoje.getFullYear() + '-' + String(hoje.getMonth() + 1).padStart(2, '0');
  const hojeStr = hoje.toISOString().split('T')[0];

  const reservasMes = reservas.filter(r => r.data && r.data.startsWith(mesAtual));
  const sala = reservas.filter(r => r.espaco === 'sala' && r.data >= hojeStr);
  const campo = reservas.filter(r => r.espaco === 'campo' && r.data >= hojeStr);

  document.getElementById('statTotal').textContent = reservasMes.length;
  document.getElementById('statSala').textContent = sala.length;
  document.getElementById('statCampo').textContent = campo.length;

  renderizarTabela();
}

// Renderizar tabela
function renderizarTabela() {
  const tbody = document.getElementById('tableReservas');
  const filtroEspaco = document.getElementById('filtroEspaco').value;
  const filtroPeriodo = document.getElementById('filtroPeriodo').value;
  const hojeStr = new Date().toISOString().split('T')[0];

  let lista = [...reservas];

  if (filtroEspaco) lista = lista.filter(r => r.espaco === filtroEspaco);

  if (filtroPeriodo === 'futuras') lista = lista.filter(r => r.data >= hojeStr);
  else if (filtroPeriodo === 'passadas') lista = lista.filter(r => r.data < hojeStr);

  lista.sort((a, b) => (b.data + b.inicio).localeCompare(a.data + a.inicio));

  if (lista.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">Sem reservas</td></tr>';
    return;
  }

  tbody.innerHTML = lista.map(r => {
    const dataBR = r.data ? new Date(r.data + 'T12:00:00').toLocaleDateString('pt-PT') : '—';
    const espaco = r.espaco === 'sala' ? '🎉 Sala' : '⚽ Campo';
    const badgeClass = r.espaco === 'sala' ? 'badge-sala' : 'badge-campo';
    const predio = PREDIOS_NOMES[r.predio] || r.predio || '—';
    const andar = ANDARES_NOMES[r.andar] || r.andar || '—';
    const desc = r.descricao || '—';
    const descTrunc = desc.length > 30 ? desc.substring(0, 30) + '…' : desc;

    return `<tr>
      <td>${dataBR}</td>
      <td>${r.inicio || '—'}–${r.fim || '—'}</td>
      <td><span class="badge ${badgeClass}">${espaco}</span></td>
      <td>${predio}</td>
      <td>${andar}</td>
      <td>${r.nome || '—'}</td>
      <td>${r.telefone || '—'}</td>
      <td>${r.email || '—'}</td>
      <td title="${desc}">${descTrunc}</td>
      <td><button class="btn-del" onclick="eliminarReserva('${r.id}','${r.pin}')">Eliminar</button></td>
    </tr>`;
  }).join('');
}

// Eliminar reserva (admin usa o PIN guardado)
async function eliminarReserva(id, pin) {
  if (!confirm('Tens a certeza que queres eliminar esta reserva?')) return;
  try {
    const res = await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'delete', id, pin})});
    const data = await res.json();
    if (data.success) {
      alert('Reserva eliminada com sucesso!');
      carregarDados();
    } else {
      alert('Erro: ' + (data.error || 'desconhecido'));
    }
  } catch(e) {
    alert('Erro de ligação');
  }
}
</script>
</body>
</html>
